name: pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: eu-west-2

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify

  cdk-diff:
    name: cdk diff
    runs-on: ubuntu-latest
    # Skip the AWS-touching job for PRs that can't assume the deploy role:
    #   - Fork PRs run under the fork's OIDC namespace.
    #   - Dependabot PRs don't receive repo Actions secrets, so the role ARN
    #     is empty and configure-aws-credentials fails.
    # The verify job still runs in both cases.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    needs: verify
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v6
        id: aws
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Synthesise the cloud assembly the diff action consumes. The nx synth
      # target builds the cdk package and the site first, writing to
      # packages/cdk/cdk.out.
      - name: cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: npm run cdk:synth

      # Posts a single sticky PR comment with a collapsible, colour-coded diff
      # per stack. Temporarily pinned to our fork's commit SHA to dogfood the
      # ignoreAssetChanges input (corymhall/cdk-diff-action#162); reverts to the
      # upstream SHA pin once that lands. SHA-pinned: third-party code in an
      # AWS-credentialed job.
      - name: post diff comment
        uses: laazyj/cdk-diff-action@89d0fc69259398b43feeb4c80bced98634eb9ff7 # feat/ignore-asset-changes
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          cdkOutDir: packages/cdk/cdk.out
          # Surface the diff only; the diff is informational and never gates the
          # PR check (matches prior behaviour).
          failOnDestructiveChanges: false
          # Drop the BucketDeployment content-hash churn that would otherwise
          # show as a (destructive) update on every content PR — not infra.
          ignoreAssetChanges: true
